  .stat-value { font-size: 22px; font-weight: 700; color: #0EA5E9; }
  .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; }
  #node-detail { background: #1e293b; border-radius: 10px; padding: 14px; display: none; }

  .detail-value { color: #e2e8f0; font-weight: 600; }
  .files-list { margin-top: 8px; font-size: 11px; color: #64748b; }
  .cluster-tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; margin-top: 6px; }

const width  = window.innerWidth - 320;
const height = window.innerHeight;

const svg = d3.select("#svg")
  .attr("viewBox", [0, 0, width, height]);

const g = svg.append("g");

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.2, 4])
  .on("zoom", e => g.attr("transform", e.transform)));

// Stats
const allClusters = [...new Set(GRAPH.nodes.map(n => n.group))];
const allFiles    = new Set(GRAPH.nodes.flatMap(n => n.files));
document.getElementById("node-count").textContent    = GRAPH.nodes.length;
document.getElementById("edge-count").textContent    = GRAPH.links.length;
document.getElementById("cluster-count").textContent = allClusters.length;
document.getElementById("file-count").textContent    = allFiles.size;

// Legend
const legendEl = document.getElementById("legend");
const clusterInfo = {};
GRAPH.nodes.forEach(n => { clusterInfo[n.group] = {label: n.label, color: n.color}; });
Object.entries(clusterInfo).forEach(([id, {label, color}]) => {
  const div = document.createElement("div");
  div.className = "legend-item";
  div.dataset.cluster = id;
  div.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span>${label}</span>`;
  div.onclick = () => filterByCluster(label);
  legendEl.appendChild(div);
});

// Simulation
const simulation = d3.forceSimulation(GRAPH.nodes)
  .force("link", d3.forceLink(GRAPH.links).id(d => d.id).distance(d => 80 / Math.sqrt(d.weight || 1)))
  .force("charge", d3.forceManyBody().strength(d => -120 - d.size * 3))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => d.size + 6));

// Links
const link = g.append("g")
  .selectAll("line")
  .data(GRAPH.links)
  .join("line")
  .attr("class", "link")
  .attr("stroke-width", d => Math.sqrt(d.weight));

// Nodes
const node = g.append("g")
  .selectAll("g")
  .data(GRAPH.nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag",  dragged)
    .on("end",   dragEnd))
  .on("click", showDetail)
  .on("mouseover", showTooltip)
  .on("mouseout",  hideTooltip);

node.append("circle")
  .attr("r", d => d.size)
  .attr("fill", d => d.color)
  .attr("fill-opacity", 0.85);

node.append("text")
  .text(d => d.id)
  .attr("x", d => d.size + 4)
  .attr("y", 4)
  .attr("font-size", d => d.composite > 0.05 ? "12px" : "10px")
  .attr("font-weight", d => d.composite > 0.08 ? "700" : "400");

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Drag
function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(e, d)    { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d)    { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// Tooltip
const tooltip = document.getElementById("tooltip");
function showTooltip(e, d) {
  tooltip.style.display = "block";
  tooltip.style.left = (e.clientX + 14) + "px";
  tooltip.style.top  = (e.clientY - 28) + "px";
  tooltip.innerHTML  = `<strong>${d.id}</strong><br>${d.label}<br>Mentions: ${d.mentions} · Connections: ${GRAPH.links.filter(l => l.source.id === d.id || l.target.id === d.id).length}`;
}
function hideTooltip() { tooltip.style.display = "none"; }

// Node detail panel
function showDetail(e, d) {
  const panel = document.getElementById("node-detail");
  const isGod = d.composite > 0.08;
  const neighbors = GRAPH.links
    .filter(l => l.source.id === d.id || l.target.id === d.id)
    .map(l => l.source.id === d.id ? l.target.id : l.source.id)
    .slice(0, 6).join(", ");

  panel.style.display = "block";
  panel.innerHTML = `
    <h3>${d.id} ${isGod ? '<span class="god-node-badge">⚡ GOD NODE</span>' : ''}</h3>
    <span class="cluster-tag" style="background:${d.color}22;color:${d.color};border:1px solid ${d.color}44">${d.label}</span>
    <div style="margin-top:10px">
      <div class="detail-row"><span class="detail-label">Composite score</span><span class="detail-value">${d.composite.toFixed(4)}</span></div>
      <div class="detail-row"><span class="detail-label">Degree centrality</span><span class="detail-value">${d.degree.toFixed(4)}</span></div>
      <div class="detail-row"><span class="detail-label">Betweenness</span><span class="detail-value">${d.betweenness.toFixed(4)}</span></div>
      <div class="detail-row"><span class="detail-label">PageRank</span><span class="detail-value">${d.pagerank.toFixed(4)}</span></div>
      <div class="detail-row"><span class="detail-label">Mentions</span><span class="detail-value">${d.mentions}</span></div>
      <div class="detail-row"><span class="detail-label">Documents</span><span class="detail-value">${d.files.length}</span></div>
    </div>
    <div class="files-list"><strong>Connected to:</strong><br>${neighbors || "—"}</div>
    <div class="files-list"><strong>Found in:</strong><br>${d.files.slice(0,4).join(", ")}${d.files.length > 4 ? ` +${d.files.length-4} more` : ''}</div>
  `;
}

// Search
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  node.selectAll("circle").attr("opacity", d => !q || d.id.toLowerCase().includes(q) ? 1 : 0.15);
  node.selectAll("text").attr("opacity",   d => !q || d.id.toLowerCase().includes(q) ? 1 : 0.1);
  link.attr("opacity", d => !q ? 0.6 : (
    d.source.id.toLowerCase().includes(q) || d.target.id.toLowerCase().includes(q) ? 0.8 : 0.05
  ));
});

// Cluster filter
document.getElementById("cluster-filter").addEventListener("change", function() {
  filterByCluster(this.value);
});

function filterByCluster(label) {
  node.selectAll("circle").attr("opacity", d => !label || d.label === label ? 1 : 0.15);
  node.selectAll("text").attr("opacity",   d => !label || d.label === label ? 1 : 0.1);
  link.attr("opacity", d => !label ? 0.6 : (
    d.source.label === label && d.target.label === label ? 0.8 : 0.05
  ));
  document.getElementById("cluster-filter").value = label;
}
</script>
